# Local development stack for SentinelBrief.
# Starts Qdrant, Ollama, the Python ai-service and the C# web-api.
#
# Usage:
#   docker compose up --build
#
# Notes:
# - Ollama models must be pulled once after the container is running, e.g.:
#     docker compose exec ollama ollama pull llama3.1:8b
#     docker compose exec ollama ollama pull nomic-embed-text
# - Restricted mode keeps everything on the local network only.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  ai-service:
    build:
      context: ./src/ai-service
    ports:
      - "8000:8000"
    environment:
      RESTRICTED_MODE: "true"
      LLM_PROVIDER: "ollama"
      EMBEDDING_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "llama3.1:8b"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "sentinelbrief_documents"
      AI_SERVICE_HOST: "0.0.0.0"
      AI_SERVICE_PORT: "8000"
      LOG_LEVEL: "INFO"
    depends_on:
      - qdrant
      - ollama

  web-api:
    build:
      context: ./src/web-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      AI_SERVICE_URL: "http://ai-service:8000"
    depends_on:
      - ai-service

volumes:
  qdrant_storage:
  ollama_models:
