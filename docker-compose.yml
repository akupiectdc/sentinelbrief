# VM deployment stack for SentinelBrief (deployment branch).
# Same services as main, with VM-specific settings baked in: a restart policy so
# the stack returns after a reboot, a kept-warm chat model (OLLAMA_KEEP_ALIVE),
# and a smaller chat model that stays responsive on a CPU-only VM.
#
# Usage:
#   docker compose up -d --build
#
# Notes:
# - Pull the models once after the containers are running:
#     docker compose exec ollama ollama pull llama3.2:3b
#     docker compose exec ollama ollama pull nomic-embed-text
# - Restricted mode keeps everything on the local network only.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  ai-service:
    restart: unless-stopped
    build:
      context: ./src/ai-service
    ports:
      - "8000:8000"
    environment:
      RESTRICTED_MODE: "true"
      LLM_PROVIDER: "ollama"
      EMBEDDING_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "llama3.2:3b"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "sentinelbrief_documents"
      AI_SERVICE_HOST: "0.0.0.0"
      AI_SERVICE_PORT: "8000"
      LOG_LEVEL: "INFO"
    depends_on:
      - qdrant
      - ollama

  web-api:
    restart: unless-stopped
    build:
      context: ./src/web-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      AI_SERVICE_URL: "http://ai-service:8000"
    depends_on:
      - ai-service

volumes:
  qdrant_storage:
  ollama_models:
