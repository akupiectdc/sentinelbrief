name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Unit tests are self-contained: no Ollama, Qdrant, secrets, or cloud APIs.
jobs:
  python-ai-service:
    name: Python ai-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

  dotnet-web-api:
    name: .NET web-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release
