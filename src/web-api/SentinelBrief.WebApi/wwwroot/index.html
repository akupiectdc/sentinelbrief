<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelBrief :: secure shell</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%276%27%20fill%3D%27%2302060a%27/%3E%3Crect%20x%3D%271.5%27%20y%3D%271.5%27%20width%3D%2729%27%20height%3D%2729%27%20rx%3D%275%27%20fill%3D%27none%27%20stroke%3D%27%2311402f%27%20stroke-width%3D%271%27/%3E%3Cpath%20d%3D%27M9%2011l6%205-6%205%27%20fill%3D%27none%27%20stroke%3D%27%232bff9a%27%20stroke-width%3D%272.6%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%3Crect%20x%3D%2717%27%20y%3D%2719.4%27%20width%3D%277%27%20height%3D%272.6%27%20rx%3D%271.3%27%20fill%3D%27%232bff9a%27/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #02060a;
      --term-bg: rgba(4, 12, 10, 0.86);
      --term-border: #114030;
      --green: #2bff9a;
      --green-dim: #1aa86a;
      --green-faint: rgba(43, 255, 154, 0.12);
      --cyan: #38e1ff;
      --amber: #ffc24b;
      --red: #ff5d6c;
      --text: #c8ffe6;
      --muted: #5fae8c;
      --faint: #3c6f5a;
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, ui-monospace, monospace;
      --glow: 0 0 8px rgba(43, 255, 154, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14.5px;
      line-height: 1.6;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Matrix rain canvas, behind everything */
    #matrix {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      opacity: 0.22;
      z-index: 0;
    }

    /* CRT scanlines + vignette overlay */
    .crt::before {
      content: ""; position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
      mix-blend-mode: multiply;
    }
    .crt::after {
      content: ""; position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(120% 120% at 50% 50%, transparent 60%, rgba(0,0,0,0.55) 100%);
      animation: flicker 4.5s infinite steps(60);
    }
    @keyframes flicker {
      0%, 96%, 100% { opacity: 1; }
      97% { opacity: 0.86; }
      98% { opacity: 0.97; }
      99% { opacity: 0.9; }
    }

    .stage {
      position: relative; z-index: 2;
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .terminal {
      width: 100%; max-width: 860px; height: min(82vh, 720px);
      display: flex; flex-direction: column;
      background: var(--term-bg);
      border: 1px solid var(--term-border);
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(43,255,154,0.05),
                  0 30px 80px -30px rgba(0,0,0,0.9),
                  inset 0 0 70px -40px rgba(43,255,154,0.5);
      backdrop-filter: blur(2px);
      overflow: hidden;
    }

    /* Title bar */
    .bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(180deg, rgba(43,255,154,0.06), transparent);
      border-bottom: 1px solid var(--term-border);
      flex-shrink: 0;
    }
    /* Decorative status LEDs (not window controls): dim -> bright phosphor. */
    .lights { display: flex; gap: 7px; }
    .lights i {
      width: 11px; height: 11px; border-radius: 50%; display: block;
      background: var(--green-dim); opacity: 0.3;
      transition: opacity 0.25s, box-shadow 0.25s;
    }
    .lights i:nth-child(2) { opacity: 0.55; }
    .lights i:nth-child(3) {
      opacity: 1; background: var(--green);
      box-shadow: 0 0 6px rgba(43, 255, 154, 0.5);
    }
    .lights:hover i { opacity: 0.9; }
    .bar .title {
      flex: 1; text-align: center; color: var(--muted);
      font-size: 12.5px; letter-spacing: 0.4px;
    }
    .bar .conn { color: var(--green-dim); font-size: 11.5px; display: flex; align-items: center; gap: 6px; }
    .bar .pulse {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      box-shadow: var(--glow); animation: beat 2s infinite;
    }
    @keyframes beat { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Scrollback */
    .screen {
      flex: 1; overflow-y: auto;
      padding: 18px 18px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--term-border) transparent;
    }
    .screen::-webkit-scrollbar { width: 8px; }
    .screen::-webkit-scrollbar-thumb { background: var(--term-border); border-radius: 4px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line + .line { margin-top: 2px; }
    .dim { color: var(--muted); }
    .faint { color: var(--faint); }
    .ok { color: var(--green); }
    .tag { color: var(--green-dim); }
    .banner { color: var(--green); text-shadow: var(--glow); }

    /* Echoed command */
    .cmd { color: var(--text); }
    .cmd .prompt { color: var(--cyan); }

    /* Answer block */
    .answer {
      margin: 8px 0 4px; padding: 10px 14px;
      border-left: 2px solid var(--green);
      background: var(--green-faint);
      color: var(--text); white-space: pre-wrap;
    }
    .answer.refused { border-left-color: var(--amber); background: rgba(255,194,75,0.08); }
    .answer.err { border-left-color: var(--red); background: rgba(255,93,108,0.08); }
    .status-tag { font-weight: 600; letter-spacing: 0.5px; }
    .status-tag.refused { color: var(--amber); }
    .status-tag.err { color: var(--red); }

    /* Citations */
    .sources { margin: 6px 0 10px; }
    .sources .head { color: var(--green-dim); margin-bottom: 4px; }
    .cite { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
    .cite .idx { color: var(--faint); flex-shrink: 0; }
    .cite .title { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cite .chunk { color: var(--faint); font-size: 12px; flex-shrink: 0; }
    .cite .bar2 { width: 70px; height: 5px; background: rgba(43,255,154,0.12); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .cite .bar2 > span { display: block; height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); box-shadow: var(--glow); }
    .cite .val { color: var(--green); font-size: 12px; width: 46px; text-align: right; flex-shrink: 0; }

    /* Spinner line */
    .spin .sp { color: var(--green); text-shadow: var(--glow); }

    /* Hints */
    .hint { color: var(--cyan); cursor: pointer; opacity: 0.85; }
    .hint:hover { opacity: 1; text-decoration: underline; }

    /* Prompt input row */
    .promptline {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 18px;
      border-top: 1px solid var(--term-border);
      background: linear-gradient(0deg, rgba(43,255,154,0.04), transparent);
      flex-shrink: 0;
    }
    .promptline .ps1 { color: var(--cyan); white-space: nowrap; }
    .promptline form { display: flex; align-items: center; min-width: 0; }
    #q {
      /* Width is sized to the typed text by JS so the block cursor sits
         immediately after the text, not pinned to the right of the row. */
      width: 4px; min-width: 4px; max-width: 100%;
      padding: 0; margin: 0;
      background: transparent; border: 0; outline: 0;
      color: var(--text); font-family: var(--mono); font-size: 14.5px;
      caret-color: transparent;
    }
    /* Hidden mirror used only to measure the typed text width. */
    .measure {
      position: absolute; left: -9999px; top: 0;
      white-space: pre; visibility: hidden;
      font-family: var(--mono); font-size: 14.5px;
    }
    /* Custom block cursor */
    .curse {
      width: 9px; height: 17px; background: var(--green);
      box-shadow: var(--glow); display: inline-block; margin-left: -2px;
      animation: blink 1.05s steps(1) infinite;
    }
    @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
    .promptline.busy .curse { animation: none; opacity: 0.3; }
    .promptline.busy #q { opacity: 0.5; }

    @media (prefers-reduced-motion: reduce) {
      .crt::after, .pulse, .curse { animation: none; }
      #matrix { display: none; }
    }
    @media (max-width: 600px) {
      .bar .conn { display: none; }
      .terminal { height: 88vh; }
    }
  </style>
</head>
<body class="crt">
  <canvas id="matrix"></canvas>
  <div class="stage">
    <main class="terminal" id="terminal">
      <div class="bar">
        <span class="lights" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="title">SentinelBrief :: secure shell - local cyber intelligence RAG</span>
        <span class="conn"><span class="pulse"></span> local-only</span>
      </div>
      <div class="screen" id="screen" aria-live="polite"></div>
      <div class="promptline" id="promptline">
        <span class="ps1">analyst@sentinelbrief:~$</span>
        <form id="ask-form" autocomplete="off">
          <input id="q" type="text" aria-label="Ask a question" autofocus />
        </form>
        <span class="curse" id="curse" aria-hidden="true"></span>
        <span class="measure" id="measure" aria-hidden="true"></span>
      </div>
    </main>
  </div>

  <script>
    const screen = document.getElementById("screen");
    const form = document.getElementById("ask-form");
    const input = document.getElementById("q");
    const promptline = document.getElementById("promptline");
    const measure = document.getElementById("measure");
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // Size the input to its text so the block cursor follows what you type.
    function sizeInput() {
      measure.textContent = input.value;
      // Round up sub-pixel width and add a small buffer so the text never
      // overflows the input (which would scroll it and clip the first letters).
      input.style.width = (Math.ceil(measure.getBoundingClientRect().width) + 6) + "px";
    }
    input.addEventListener("input", sizeInput);
    sizeInput();

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const scroll = () => { screen.scrollTop = screen.scrollHeight; };

    function append(html, cls) {
      const div = document.createElement("div");
      div.className = "line" + (cls ? " " + cls : "");
      div.innerHTML = html;
      screen.appendChild(div);
      scroll();
      return div;
    }

    // Typewriter that fills an element; click anywhere to finish instantly.
    let skip = false;
    document.addEventListener("click", () => { skip = true; });
    async function type(el, text, speed = 9) {
      if (reduce) { el.textContent = text; scroll(); return; }
      skip = false;
      for (let i = 0; i < text.length; i++) {
        if (skip) { el.textContent = text; break; }
        el.textContent += text[i];
        if (i % 3 === 0) scroll();
        await sleep(text[i] === "\n" ? speed * 3 : speed);
      }
      scroll();
    }

    // ASCII spinner line; returns a stop() function.
    function spinner(label) {
      const frames = ["|", "/", "-", "\\"];
      const line = append('<span class="sp"></span> <span class="dim"></span>', "spin");
      const sp = line.querySelector(".sp");
      line.querySelector(".dim").textContent = label;
      let i = 0;
      const id = setInterval(() => { sp.textContent = frames[i++ % frames.length]; }, 90);
      return () => { clearInterval(id); line.remove(); };
    }

    const EXAMPLES = [
      "How should security incidents be reported?",
      "What are the first steps when a phishing email is reported?",
      "How are patches prioritised by severity?",
      "What are the data classification levels?",
    ];

    async function boot() {
      // Pull the real configured models from the backend so the banner is
      // accurate; fall back to generic labels if the call fails.
      let info = null;
      try {
        const r = await fetch("/info");
        if (r.ok) info = await r.json();
      } catch (e) { /* keep generic fallbacks below */ }
      const restricted = info
        ? (info.restrictedMode ? "ENABLED (local-only)" : "disabled")
        : "ENABLED (local-only)";
      const embeddings = info ? info.embeddingProvider + " / " + info.embeddingModel : "ollama (local)";
      const llm = info ? info.llmProvider + " / " + info.chatModel : "ollama (local)";

      const lines = [
        ['<span class="banner">SentinelBrief secure shell v0.1.0</span>', 0],
        ['<span class="faint">(c) local/on-prem cyber intelligence RAG workbench</span>', 0],
        ['', 60],
        ['<span class="tag">[ ok ]</span> <span class="dim">restricted mode .......... ' + esc(restricted) + '</span>', 120],
        ['<span class="tag">[ ok ]</span> <span class="dim">vector store ............. qdrant @ :6333</span>', 120],
        ['<span class="tag">[ ok ]</span> <span class="dim">embeddings ............... ' + esc(embeddings) + '</span>', 120],
        ['<span class="tag">[ ok ]</span> <span class="dim">llm ...................... ' + esc(llm) + '</span>', 120],
        ['', 60],
        ['<span class="dim">Answers are grounded in retrieved evidence only, with citations,</span>', 0],
        ['<span class="dim">and refuse when the indexed documents are insufficient.</span>', 0],
        ['', 60],
      ];
      for (const [html, delay] of lines) {
        append(html);
        if (!reduce) await sleep(delay);
      }
      const hints = EXAMPLES.map((e) =>
        '<span class="hint" data-q="' + esc(e) + '">&gt; ' + esc(e) + "</span>").join("\n");
      append('<span class="faint">try one of:</span>\n' + hints);
      append("");
      input.focus();
    }

    function renderCitations(citations) {
      if (!citations || !citations.length) return;
      const wrap = document.createElement("div");
      wrap.className = "line sources";
      let html = '<div class="head">sources [' + citations.length + "]:</div>";
      citations.forEach((c, i) => {
        const score = c.score != null ? Number(c.score) : null;
        const pct = score != null ? Math.max(0, Math.min(1, score)) * 100 : 0;
        const val = score != null ? score.toFixed(3) : "n/a";
        html +=
          '<div class="cite">' +
            '<span class="idx">[' + (i + 1) + "]</span>" +
            '<span class="title">' + esc(c.sourceTitle || "Untitled") + "</span>" +
            '<span class="chunk">' + esc(c.chunkId || "") + "</span>" +
            '<span class="bar2"><span style="width:' + pct + '%"></span></span>' +
            '<span class="val">' + val + "</span>" +
          "</div>";
      });
      wrap.innerHTML = html;
      screen.appendChild(wrap);
      scroll();
    }

    async function run(question) {
      promptline.classList.add("busy");
      input.value = "";
      sizeInput();
      input.disabled = true;
      append('<span class="prompt" style="color:var(--cyan)">analyst@sentinelbrief:~$</span> ' + esc(question), "cmd");

      const stop = spinner("retrieving evidence and grounding answer ...");
      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        stop();
        if (!res.ok) {
          const msg = res.status === 502
            ? "ai-service unreachable. is ollama + qdrant up?  (HTTP 502)"
            : "request failed (HTTP " + res.status + ")";
          append('<span class="status-tag err">[ error ]</span>', "");
          const box = append("", "answer err");
          await type(box, msg);
          return;
        }
        const data = await res.json();
        if (data.refused) {
          append('<span class="status-tag refused">[ refused ] insufficient evidence</span>');
          const box = append("", "answer refused");
          await type(box, data.answer);
        } else {
          append('<span class="ok">[ answer ]</span>');
          const box = append("", "answer");
          await type(box, data.answer || "");
          renderCitations(data.citations);
        }
      } catch (err) {
        stop();
        append('<span class="status-tag err">[ error ]</span>');
        const box = append("", "answer err");
        await type(box, "could not reach the gateway. is the service running?");
      } finally {
        append("");
        promptline.classList.remove("busy");
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q || input.disabled) return;
      run(q);
    });

    // Clickable example hints (event-delegated).
    screen.addEventListener("click", (e) => {
      const h = e.target.closest(".hint");
      if (h && !input.disabled) { input.value = h.dataset.q; sizeInput(); form.requestSubmit(); }
    });

    // Keep focus in the prompt when clicking around the terminal.
    document.getElementById("terminal").addEventListener("mousedown", (e) => {
      if (!e.target.closest(".hint") && !window.getSelection().toString()) {
        setTimeout(() => input.focus(), 0);
      }
    });

    /* ---- Matrix rain background ---- */
    (function matrix() {
      if (reduce) return;
      const cv = document.getElementById("matrix");
      const ctx = cv.getContext("2d");
      let cols, drops, fontSize = 14;
      const glyphs = "01<>[]{}#$%&*+=/\\|abcdef0123456789";
      function resize() {
        cv.width = window.innerWidth; cv.height = window.innerHeight;
        cols = Math.floor(cv.width / fontSize);
        drops = Array(cols).fill(0).map(() => Math.random() * -50);
      }
      resize();
      window.addEventListener("resize", resize);
      let last = 0;
      function frame(t) {
        if (t - last > 55) {
          last = t;
          ctx.fillStyle = "rgba(2,6,10,0.20)";
          ctx.fillRect(0, 0, cv.width, cv.height);
          ctx.fillStyle = "#2bff9a";
          ctx.font = fontSize + "px monospace";
          for (let i = 0; i < cols; i++) {
            const ch = glyphs[Math.floor(Math.random() * glyphs.length)];
            ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > cv.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
          }
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();

    boot();
  </script>
</body>
</html>
